<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RSS Monitor</title>
</head>
<body>
  <main>
    <h1>RSS Monitor</h1>

    <form id="feed-form">
      <label for="feed-url">URL du flux RSS</label>
      <input id="feed-url" name="url" type="url" placeholder="https://example.com/rss.xml" required>
      <button type="submit">Récuperer</button>
    </form>

    <p id="status" role="status"></p>
    <section id="feed-result" aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
